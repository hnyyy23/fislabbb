<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FISLAB II</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background: radial-gradient(circle at top,#1e3a8a,#0f172a);
  color:white;
}

/* LOGIN CARD */
.login-box{
  width:340px;
  margin:8% auto;
  padding:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:230px;
  height:100vh;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(15px);
  padding:20px;
  display:none;
}

.sidebar h3{
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:12px 0;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  margin-left:250px;
  padding:25px;
  display:none;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:18px;
  margin:12px 0;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* TITLE */
h2{
  font-size:28px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h2>FISLAB II</h2>
  <p style="opacity:0.7">Sistem Praktikum Fisika</p>

  <input id="nrp" placeholder="NRP">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Masuk</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>⚛ FISLAB</h3>

  <a onclick="show('home')">🏠 Dashboard</a>
  <a onclick="show('nilai')">📊 Nilai</a>
  <a onclick="show('jadwal')">📅 Jadwal</a>
  <a onclick="show('profile')">👤 Profil</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div id="home">
  <h2>Dashboard</h2>
  <div class="card" id="infoUser"></div>
</div>

<div id="nilai" style="display:none">
  <h2>Nilai Praktikum</h2>
  <div id="nilaiList"></div>
</div>

<div id="jadwal" style="display:none">
  <h2>Jadwal Praktikum</h2>
  <div id="jadwalList"></div>
</div>

<div id="profile" style="display:none">
  <h2>Profil</h2>
  <div class="card">
    <p id="profileInfo"></p>
  </div>
</div>

</div>

<script>
let user=null;

/* LOGIN */
function login(){
  const nrp=document.getElementById("nrp").value;
  const pass=document.getElementById("pass").value;

  if(nrp==="5001241080" && pass===nrp){
    user={nrp,role:"asisten"};
    start();
    return;
  }

  if(nrp>=5001251001 && nrp<=5001251100 && pass===nrp){
    user={nrp,role:"praktikan"};
    start();
    return;
  }

  alert("Login gagal");
}

/* START */
function start(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("sidebar").style.display="block";
  document.getElementById("main").style.display="block";

  document.getElementById("infoUser").innerHTML=
  `<b>NRP:</b> ${user.nrp}<br><b>Role:</b> ${user.role}`;

  document.getElementById("profileInfo").innerText=
  `NRP: ${user.nrp}`;

  loadDummy();
}

/* NAV */
function show(id){
  document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
  document.getElementById(id).style.display="block";
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* DATA DUMMY */
function loadDummy(){
  document.getElementById("nilaiList").innerHTML=
  `<div class="card">MP1 - 85</div>
   <div class="card">MP2 - 90</div>`;

  document.getElementById("jadwalList").innerHTML=
  `<div class="card">Konstanta Planck - 12 Mei</div>
   <div class="card">Franck Hertz - 20 Mei</div>`;
}
</script>

</body>
</html>
